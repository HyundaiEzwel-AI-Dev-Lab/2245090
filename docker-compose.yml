services:
  postgres:
    image: postgres:16-alpine
    container_name: pms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pms
      POSTGRES_USER: pms
      POSTGRES_PASSWORD: pms1234
      TZ: Asia/Seoul
    volumes:
      - pms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms -d pms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pms_postgres_data:
