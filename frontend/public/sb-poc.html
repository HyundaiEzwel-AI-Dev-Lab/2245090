lane h3{font-size:14px;margin:0 0 10px;display:flex;justify-content:space-between}.mini-card{background:white;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}.chart{height:190px;display:flex;align-items:flex-end;gap:14px;padding:12px;border:1px solid var(--line);border-radius:16px;background:#f8fafc}.colbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;height:100%}.colbar i{width:100%;border-radius:10px 10px 3px 3px;background:linear-gradient(180deg,#60a5fa,#2563eb);min-height:8px}.colbar span{font-size:11px;color:#64748b;text-align:center}.resource-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.person{display:flex;align-items:center;gap:10px}.person .avatar{background:#e0e7ff;color:#3730a3}.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;align-items:center;justify-content:center;z-index:50;padding:22px}.modal{background:white;border-radius:22px;border:1px solid var(--line);box-shadow:0 30px 80px rgba(15,23,42,.28);width:min(780px,95vw);max-height:86vh;overflow:auto}.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}.modal-body{padding:20px}.modal.show,.modal-backdrop.show{display:flex}.close{border:0;background:#f1f5f9;border-radius:11px;width:34px;height:34px}.empty{display:grid;place-items:center;text-align:center;min-height:220px;color:#64748b}.empty strong{color:#334155}.flow{display:flex;gap:8px;overflow:auto;padding:4px 0}.flow .step{min-width:150px;border:1px solid var(--line);background:white;border-radius:15px;padding:13px;position:relative}.flow .step:not(:last-child):after{content:"›";position:absolute;right:-10px;top:34%;font-size:24px;color:#94a3b8}.screen-map{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.screen-map button{background:#fff;border:1px solid var(--line);border-radius:14px;text-align:left;padding:12px}.screen-map button:hove     /* =========================================================
       UI REFINE PASS v2 - 2026.06.28
       목적: SB 전체 POC를 발표/시연용으로 보이도록 톤, 간격, 표/모달/캘린더 가독성 보정
       ========================================================= */
    :root{
      --bg:#eef3fa;
      --panel:#ffffff;
      --panel2:#f8fbff;
      --ink:#111827;
      --muted:#64748b;
      --line:#dce5f1;
      --primary:#2f6fed;
      --primary2:#1f5bd7;
      --green:#12a15d;
      --amber:#e89a16;
      --red:#e04848;
      --purple:#7b61ff;
      --gray:#94a3b8;
      --shadow:0 16px 40px rgba(15,23,42,.08);
      --shadow2:0 6px 18px rgba(15,23,42,.05);
      --radius:20px;
      --radius2:14px;
    }
    html{scroll-behavior:smooth}
    body{
      background:
        radial-gradient(circle at top left,rgba(47,111,237,.10),transparent 32%),
        radial-gradient(circle at top right,rgba(123,97,255,.08),transparent 28%),
        var(--bg);
      letter-spacing:-.01em;
    }
    .app{grid-template-columns:264px minmax(0,1fr)}
    .sidebar{
      width:264px;
      background:linear-gradient(180deg,#0b1220 0%,#111827 54%,#0f172a 100%);
      padding:18px 14px;
      box-shadow:8px 0 28px rgba(15,23,42,.12);
    }
    .sidebar::-webkit-scrollbar,.tabs::-webkit-scrollbar{width:8px;height:8px}
    .sidebar::-webkit-scrollbar-thumb,.tabs::-webkit-scrollbar-thumb{background:rgba(148,163,184,.35);border-radius:999px}
    .brand{padding:8px 8px 16px;margin-bottom:12px}
    .brand h1{font-size:15px;letter-spacing:-.02em}
    .logo{width:38px;height:38px;border-radius:13px;background:linear-gradient(135deg,#38bdf8,#6366f1 55%,#8b5cf6)}
    .nav-title{font-size:10px;color:#8ea3c2;margin-top:16px}
    .nav-btn{
      min-height:38px;
      padding:9px 11px;
      color:#d6e3f5;
      border:1px solid transparent;
      transition:background .14s ease,border-color .14s ease,transform .14s ease;
    }
    .nav-btn:hover{background:rgba(255,255,255,.075);transform:translateX(2px)}
    .nav-btn.active{
      background:linear-gradient(135deg,#2f6fed,#5b7cfa);
      border-color:rgba(255,255,255,.18);
      box-shadow:0 10px 24px rgba(47,111,237,.28);
    }
    .nav-sub{font-size:12.5px;margin-left:12px;opacity:.92}
    .nav-count{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.06)}
    .topbar{
      height:64px;
      background:rgba(255,255,255,.82);
      backdrop-filter: blur(16px);
      box-shadow:0 2px 14px rgba(15,23,42,.04);
    }
    .search-pill{
      min-width:420px;
      justify-content:flex-start;
      border-color:#d7e3f1;
      background:rgba(248,250,252,.92);
      color:#667085;
    }
    .icon-btn,.user-chip,.tab,.card,.project-card,.table-wrap,.filters,.form-section,.notice,.lane,.mini-card{
      box-shadow:var(--shadow2);
    }
    .icon-btn:hover,.btn:hover,.tab:hover,.screen-map button:hover{transform:translateY(-1px)}
    .content{padding:20px 26px 56px}
    .tabs{padding:2px 0 12px;margin-bottom:2px}
    .tab{
      border-radius:999px;
      padding:8px 12px;
      background:rgba(255,255,255,.88);
    }
    .tab.active{border-color:#75a7ff;background:#fff;box-shadow:0 8px 22px rgba(47,111,237,.13)}
    .page-head{
      background:rgba(255,255,255,.72);
      border:1px solid rgba(220,229,241,.85);
      border-radius:24px;
      padding:18px 20px;
      box-shadow:var(--shadow2);
      margin:4px 0 18px;
    }
    .crumb{font-size:12px;color:#7b8798;font-weight:650}
    .page-title{font-size:25px;letter-spacing:-.035em}
    .page-desc{max-width:780px;line-height:1.55}
    .actions{align-items:center;justify-content:flex-end;min-width:260px}
    .btn{
      border-color:#d8e2ef;
      transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease,background .12s ease;
      box-shadow:0 2px 8px rgba(15,23,42,.035);
    }
    .btn:hover{border-color:#a9c9ff;box-shadow:0 6px 16px rgba(15,23,42,.065)}
    .btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 8px 18px rgba(47,111,237,.18)}
    .btn.dark{background:linear-gradient(135deg,#111827,#0f172a)}
    .badge{font-weight:850;letter-spacing:-.01em;padding:3.5px 8px}
    .badge.purple{background:#ede9fe;color:#6d28d9}
    .grid{gap:14px}
    .card{
      border-color:rgba(220,229,241,.9);
      transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
    }
    .card:hover{box-shadow:var(--shadow);border-color:#c9d8ea}
    .card-title{font-size:15px;color:#1f2937;letter-spacing:-.02em}
    .kpi{position:relative;overflow:hidden}
    .kpi:after{content:"";position:absolute;right:-18px;top:-22px;width:72px;height:72px;border-radius:50%;background:rgba(47,111,237,.075)}
    .kpi .num{font-size:29px;letter-spacing:-.04em}
    .filters{
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(8px);
      padding:14px;
      gap:12px;
    }
    .field input,.field select,.field textarea{
      min-height:40px;
      border-color:#d9e4f2;
      background:#fff;
      outline:none;
      transition:border-color .12s ease,box-shadow .12s ease;
    }
    .field input:focus,.field select:focus,.field textarea:focus{border-color:#7db0ff;box-shadow:0 0 0 4px rgba(47,111,237,.10)}
    .table-wrap{overflow:auto;border-radius:18px}
    table{min-width:860px}
    th{position:sticky;top:0;z-index:1;background:#f7faff;color:#475467;font-size:12px}
    td{color:#243042;line-height:1.45}
    tr:last-child td{border-bottom:0}
    .project-card{border-radius:20px;background:linear-gradient(180deg,#fff,#fbfdff)}
    .project-card h3{letter-spacing:-.025em}
    .bar{height:8px;background:#e7edf5}
    .bar>i{transition:width .35s ease}
    .toggle{background:#e9eff7;border-color:#d7e2ef;gap:2px}
    .toggle button{padding:7px 12px;font-size:13px}
    .toggle button.active{color:#1d4ed8}
    .calendar{border-radius:22px;box-shadow:var(--shadow2)}
    .cal-head div{background:#f7faff;color:#526174}
    .day{min-height:118px;background:#fff}
    .day:hover{background:#fbfdff}
    .event{box-shadow:0 1px 4px rgba(30,58,138,.08)}
    .more{text-decoration:none;border-radius:8px;padding:3px 5px;background:#eff6ff}
    .notice{border-style:solid;background:#f9fbfe;color:#667085;line-height:1.55}
    .empty{background:#fff;border:1px dashed #cdd7e5;border-radius:20px}
    .kanban{gap:12px}
    .lane{background:rgba(248,251,255,.88)}
    .mini-card{transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease}
    .mini-card:hover{transform:translateY(-1px);border-color:#a9c9ff;box-shadow:0 10px 22px rgba(15,23,42,.07)}
    .screen-map button{box-shadow:0 2px 10px rgba(15,23,42,.035)}
    .screen-map small{display:block;margin-top:4px;line-height:1.35}
    .flow .step{box-shadow:var(--shadow2)}
    .modal-backdrop{display:none}
    .modal-backdrop.show{display:flex}
    .modal{display:none;flex-direction:column}
    .modal.show{display:block}
    .modal-head{position:sticky;top:0;background:white;z-index:2;border-radius:22px 22px 0 0}
    .modal-head h3{margin:0;font-size:18px;letter-spacing:-.025em}
    .modal-body{line-height:1.5}
    .close{font-size:22px;line-height:1;background:#f3f6fa;color:#475467}
    .toast{box-shadow:0 18px 42px rgba(15,23,42,.25)}
    @media(max-width:1280px){.search-pill{min-width:280px}.grid.cols-5{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media(max-width:1100px){.sidebar{width:280px}.grid.cols-5{grid-template-columns:repeat(2,minmax(0,1fr))}.page-head{display:block}.actions{justify-content:flex-start;margin-top:14px}.search-pill{min-width:220px}}

   ========================================================= */
async function apiFetch(path){
  const res = await fetch(path, { headers: { 'Accept': 'application/json' } });
  if(!res.ok) throw new Error(path + ' API 실패: ' + res.status);
  const json = await res.json();
  if(json && typeof json === 'object' && 'data' in json) return json.data;
  return json;
}
function mapProjectStatus(status, label){
  if(label) return label;
  const m = {RECEIVED:'접수', DISCUSSING:'협의중', IN_PROGRESS:'처리중', TESTING:'테스트', COMPLETED:'완료', CANCELED:'취소'};
  return m[status] || status || '접수';
}
function mapWbsStatus(status, label){
  if(label) return label;
  const m = {READY:'대기', IN_PROGRESS:'진행중', COMPLETED:'완료', PAUSED:'일시중단'};
  return m[status] || status || '대기';
}
function mapWorkType(type, label){
  if(label) return label;
  const m = {PLANNING:'기획', DESIGN:'디자인', PUBLISHING:'퍼블리싱', DEVELOPMENT:'개발', UNIT_TEST:'단위테스트', DEV_TEST:'DEV테스트', OPERATION_TEST:'운영테스트'};
  return m[type] || type || '개발';
}
function mapTestStage(stage, label){
  if(label) return label;
  const m = {UNIT:'단위', DEV:'DEV', OPERATION:'운영'};
  return m[stage] || stage || 'DEV';
}
function mapTestResult(result, label){
  if(label) return label;
  const m = {NOT_RUN:'미수행', PASS:'정상', FAIL:'오류'};
  return m[result] || result || '미수행';
}
function toPocProject(p, idx){
  const statusLabel = mapProjectStatus(p.status, p.statusLabel);
  return {
    _apiId:p.id,
    id:p.projectCode || ('PJ-' + String(p.id || idx + 1).padStart(4,'0')),
    name:p.name || '프로젝트명 미등록',
    dept:p.department || p.dept || '-',
    requester:p.requester || '-',
    status:statusLabel,
    step:statusLabel,
    open:p.openDueDate || p.open || '',
    progress:Number(p.progressRate ?? p.progress ?? 0),
    assignees:p.assignees ?? 0,
    tasks:p.tasks ?? 0,
    done:p.done ?? 0,
    priority:p.priority || '보통'
  };
}
function toPocWbs(t, idx){
  return {
    _apiId:t.id,
    id:'WBS-' + String(t.id || idx + 1).padStart(3,'0'),
    name:t.taskName || t.name || 'WBS 업무명 미등록',
    type:mapWorkType(t.workType, t.workTypeLabel),
    owner:t.assignee || t.owner || '-',
    start:t.planStartDate || t.start || '',
    end:t.planEndDate || t.end || '',
    runStart:t.actualStartDate || t.runStart || '',
    runEnd:t.actualEndDate || t.runEnd || '',
    progress:Number(t.progressRate ?? t.progress ?? 0),
    status:t.delayed ? '지연' : mapWbsStatus(t.status, t.statusLabel),
    project:(projects.find(p => p._apiId === t.projectId)?.name) || t.projectName || t.project || (projects[0]?.name || '-'),
    priority:t.priority || '보통',
    difficulty:t.difficulty || '중'
  };
}
function toPocReq(r, idx){
  return {
    _apiId:r.id,
    id:'REQ-' + String(r.id || idx + 1).padStart(3,'0'),
    title:r.title || '요구사항명 미등록',
    system:r.systemType || r.system || 'HIMS',
    biz:r.businessType || r.biz || '공통/API',
    program:r.menuName || r.program || '메뉴 미등록',
    type:r.workTypeLabel || r.type || '개발',
    status:r.statusLabel || (r.status === 'CONFIRMED' ? '확정' : r.status === 'REJECTED' ? '반려' : '검토중'),
    owner:r.owner || '-'
  };
}
function toPocTest(t, idx){
  return {
    _apiId:t.id,
    id:'CASE-' + String(t.id || idx + 1).padStart(3,'0'),
    name:t.caseName || t.name || '테스트 케이스명 미등록',
    target:t.target || '테스트 대상',
    type:mapTestStage(t.stage, t.stageLabel),
    round:t.round || '1차',
    steps:t.steps ?? 1,
    pass:t.result === 'PASS' ? 1 : 0,
    fail:t.result === 'FAIL' ? 1 : 0,
    tester:t.tester || '-',
    status:mapTestResult(t.result, t.resultLabel)
  };
}
function toPocDefect(d, idx){
  return {
    _apiId:d.id,
    id:'DEF-' + String(d.id || idx + 1).padStart(3,'0'),
    case:d.testCaseId ? 'CASE-' + String(d.testCaseId).padStart(3,'0') : '-',
    title:d.title || '결함명 미등록',
    status:d.statusLabel || d.status || '처리예정',
    owner:d.assignee || d.owner || '-',
    severity:d.severity || '중',
    type:d.type || 'DEV',
    description:d.description || ''
  };
}
async function loadBackendData(){
  try{
    const apiProjects = await apiFetch('/api/projects');
    if(Array.isArray(apiProjects) && apiProjects.length){
      projects = apiProjects.map(toPocProject);
    }

    const firstProjectApiId = projects[0]?._apiId || apiProjects?.[0]?.id;
    if(firstProjectApiId){
      const [apiReqs, apiWbs, apiTests, apiDefects] = await Promise.all([
        apiFetch('/api/projects/' + firstProjectApiId + '/requirements').catch(()=>[]),
        apiFetch('/api/projects/' + firstProjectApiId + '/wbs-tasks').catch(()=>[]),
        apiFetch('/api/projects/' + firstProjectApiId + '/test-cases').catch(()=>[]),
        apiFetch('/api/projects/' + firstProjectApiId + '/defects').catch(()=>[])
      ]);

      if(Array.isArray(apiReqs) && apiReqs.length) reqs = apiReqs.map(toPocReq);
      if(Array.isArray(apiWbs) && apiWbs.length) wbs = apiWbs.map(toPocWbs);
      if(Array.isArray(apiTests) && apiTests.length) tests = apiTests.map(toPocTest);
      if(Array.isArray(apiDefects) && apiDefects.length) defects = apiDefects.map(toPocDefect);
    }

    const assignee = encodeURIComponent('이지윤');
    const myTasks = await apiFetch('/api/my-work/wbs-tasks?assignee=' + assignee).catch(()=>[]);
    if(Array.isArray(myTasks) && myTasks.length){
      wbs = myTasks.map(toPocWbs);
    }

    toast('Backend API 데이터 연결 완료');
  }catch(e){
    console.warn('[Backend Bridge] API 연결 실패, HTML 기본 mock 데이터로 표시합니다.', e);
    toast('API 연결 실패: mock 데이터로 표시 중');
  }finally{
    render();
  }
}

loadBackendData();
</script>
